<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoidVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & VARIABLES ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #080c10;
      --bg2:        #0d1117;
      --surface:    #111820;
      --surface2:   #16202c;
      --border:     rgba(0,200,255,.12);
      --border-hi:  rgba(0,200,255,.4);
      --accent:     #00c8ff;
      --accent2:    #00ff9d;
      --danger:     #ff3358;
      --warn:       #ffaa00;
      --text:       #c8d8e8;
      --text-hi:    #eaf4ff;
      --muted:      #4a6070;
      --mono:       'Share Tech Mono', 'Courier New', monospace;
      --ui:         'Rajdhani', 'Segoe UI', sans-serif;
      --speed:      .22s;
      --ease:       cubic-bezier(.16,1,.3,1);
    }

    body {
      width: 380px;
      min-height: 560px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,200,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .vault-wrap {
      position: relative;
      z-index: 1;
      padding-bottom: 150px;
      display: flex;
      flex-direction: column;
      gap: 0;
      zoom: 1.1;
    }

    .v-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0,200,255,.05) 0%, transparent 100%);
      display: flex; align-items: center; gap: 12px;
      animation: fadeDown .45s var(--ease) both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-10px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .v-logo {
      width: 40px; height: 40px; flex-shrink: 0;
      border: 1px solid var(--border-hi);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 20px;
      background: radial-gradient(circle at 30% 30%, rgba(0,200,255,.15), transparent 70%);
      box-shadow: 0 0 20px rgba(0,200,255,.15), inset 0 1px 0 rgba(255,255,255,.06);
      animation: logoPulse 4s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 20px rgba(0,200,255,.15), inset 0 1px 0 rgba(255,255,255,.06); }
      50%      { box-shadow: 0 0 32px rgba(0,200,255,.3), inset 0 1px 0 rgba(255,255,255,.06); }
    }

    .v-header-text { flex: 1; }
    .v-title {
      font-family: var(--ui);
      font-size: 17px; font-weight: 700;
      color: var(--text-hi);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .v-subtitle {
      font-size: 10px; color: var(--muted);
      letter-spacing: .12em; margin-top: 1px;
    }

    .v-status-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 10px;
      border: 1px solid rgba(0,255,157,.2);
      border-radius: 9999px;
      font-size: 10px; color: var(--accent2);
      letter-spacing: .06em;
      background: rgba(0,255,157,.05);
    }
    .v-status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 6px var(--accent2);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:.3; }
    }

    .v-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      animation: fadeDown .45s .08s var(--ease) both;
    }
    .v-tab {
      flex: 1; padding: 10px 6px;
      background: transparent; border: none;
      font-family: var(--ui); font-size: 12px; font-weight: 600;
      color: var(--muted); letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; position: relative;
      transition: color var(--speed) var(--ease);
    }
    .v-tab::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform var(--speed) var(--ease);
      box-shadow: 0 0 8px var(--accent);
    }
    .v-tab.active { color: var(--accent); }
    .v-tab.active::after { transform: scaleX(1); }
    .v-tab:hover:not(.active) { color: var(--text); }

    .v-panel { display: none; padding: 16px 16px 4px; flex-direction: column; gap: 12px; }
    .v-panel.active { display: flex; animation: panelIn .3s var(--ease) both; }
    @keyframes panelIn {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .v-label {
      font-size: 10px; color: var(--muted);
      letter-spacing: .12em; text-transform: uppercase;
      margin-bottom: -4px;
    }

    .v-input-group { display: flex; flex-direction: column; gap: 8px; }

    .v-field { position: relative; }
    .v-field-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 13px; pointer-events: none;
      transition: color var(--speed);
    }
    .v-field:focus-within .v-field-icon { color: var(--accent); }

    .v-input {
      width: 100%; padding: 10px 12px 10px 34px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-hi);
      font-family: var(--mono); font-size: 13px;
      outline: none;
      transition: border-color var(--speed) var(--ease), box-shadow var(--speed) var(--ease), background var(--speed);
    }
    .v-input::placeholder { color: var(--muted); }
    .v-input:focus {
      border-color: var(--border-hi);
      background: var(--surface2);
      box-shadow: 0 0 0 3px rgba(0,200,255,.08), 0 0 16px rgba(0,200,255,.06);
    }
    .v-input.error {
      border-color: var(--danger) !important;
      box-shadow: 0 0 0 3px rgba(255,51,88,.12) !important;
    }
    .v-input.success {
      border-color: var(--accent2) !important;
      box-shadow: 0 0 0 3px rgba(0,255,157,.08) !important;
    }

    .v-eye {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 14px; padding: 2px; line-height: 1;
      transition: color var(--speed);
    }
    .v-eye:hover { color: var(--accent); }

    .v-strength { display: flex; flex-direction: column; gap: 4px; }
    .v-strength-track {
      height: 3px; border-radius: 9999px;
      background: var(--surface2); overflow: hidden;
    }
    .v-strength-fill {
      height: 100%; border-radius: 9999px;
      width: 0%; transition: width .4s var(--ease), background .4s var(--ease);
    }
    .v-strength-label {
      font-size: 10px; color: var(--muted); letter-spacing: .06em; text-align: right;
    }

    .v-btn-row { display: flex; gap: 8px; }

    .v-btn {
      flex: 1; min-height: 42px; padding: 12px 14px;
      border-radius: 8px; border: 1px solid transparent;
      font-family: var(--ui); font-size: 14px; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform var(--speed) var(--ease),
                  box-shadow var(--speed) var(--ease),
                  background var(--speed), border-color var(--speed);
    }
    .v-btn .btn-text { font-size: inherit; }
    .v-btn::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,.06);
      opacity: 0; transition: opacity var(--speed);
    }
    .v-btn:hover::before { opacity: 1; }
    .v-btn:active { transform: scale(.98) translateY(1px); }
    .v-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .v-btn-ghost {
      background: var(--surface); color: var(--muted); border-color: var(--border);
    }
    .v-btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--border-hi); }

    .v-btn-accent {
      background: linear-gradient(135deg, rgba(0,200,255,.18), rgba(0,200,255,.08));
      border-color: rgba(0,200,255,.35); color: var(--accent);
      box-shadow: 0 0 16px rgba(0,200,255,.1);
    }
    .v-btn-accent:hover:not(:disabled) {
      border-color: var(--accent);
      box-shadow: 0 0 24px rgba(0,200,255,.25), 0 4px 12px rgba(0,0,0,.4);
      transform: translateY(-1px);
    }

    .v-btn-success {
      background: linear-gradient(135deg, rgba(0,255,157,.18), rgba(0,255,157,.06));
      border-color: rgba(0,255,157,.3); color: var(--accent2);
      box-shadow: 0 0 16px rgba(0,255,157,.08);
    }
    .v-btn-success:hover:not(:disabled) {
      border-color: var(--accent2);
      box-shadow: 0 0 24px rgba(0,255,157,.2), 0 4px 12px rgba(0,0,0,.4);
      transform: translateY(-1px);
    }

    .v-btn-warn {
      background: linear-gradient(135deg, rgba(255,170,0,.18), rgba(255,170,0,.06));
      border-color: rgba(255,170,0,.3); color: var(--warn);
    }
    .v-btn-warn:hover:not(:disabled) {
      border-color: var(--warn);
      box-shadow: 0 0 20px rgba(255,170,0,.2);
      transform: translateY(-1px);
    }

    /* ── DANGER BUTTON ─────────────────────────────────────── */
    .v-btn-danger {
      background: linear-gradient(135deg, rgba(255,51,88,.18), rgba(255,51,88,.06));
      border-color: rgba(255,51,88,.3); color: var(--danger);
    }
    .v-btn-danger:hover:not(:disabled) {
      border-color: var(--danger);
      box-shadow: 0 0 20px rgba(255,51,88,.2);
      transform: translateY(-1px);
    }

    .v-btn-full { width: 100%; }
    .v-btn .spinner {
      display: none; width: 14px; height: 14px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    .v-btn.loading .spinner { display: inline-block; }
    .v-btn.loading .btn-text { opacity: .6; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .v-feedback {
      display: none; align-items: center; gap: 6px;
      padding: 10px 12px; border-radius: 8px;
      font-size: 13px; letter-spacing: .03em;
      animation: feedbackIn .25s var(--ease) both;
    }
    @keyframes feedbackIn {
      from { opacity:0; transform: translateY(-4px) scale(.98); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    .v-feedback.show { display: flex; }
    .v-feedback.err {
      background: rgba(255,51,88,.1); border: 1px solid rgba(255,51,88,.3); color: #ff6680;
    }
    .v-feedback.ok {
      background: rgba(0,255,157,.08); border: 1px solid rgba(0,255,157,.25); color: var(--accent2);
    }
    .v-feedback.info {
      background: rgba(0,200,255,.07); border: 1px solid rgba(0,200,255,.2); color: var(--accent);
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      10%,50%,90% { transform: translateX(-6px); }
      30%,70% { transform: translateX(6px); }
    }
    .shake { animation: shake .45s var(--ease); }

    .v-textarea {
      width: 100%; padding: 10px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-hi);
      font-family: var(--mono); font-size: 12px;
      resize: vertical; min-height: 60px; outline: none;
      transition: border-color var(--speed), box-shadow var(--speed);
    }
    .v-textarea:focus {
      border-color: var(--border-hi);
      box-shadow: 0 0 0 3px rgba(0,200,255,.08);
    }

    .v-console-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      border-top: 1px solid var(--border-hi);
      z-index: 1000; background: var(--bg);
    }
    .v-console-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 10px; color: var(--muted); letter-spacing: .08em;
    }
    .v-console-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent2); box-shadow: 0 0 5px var(--accent2);
      animation: blink 1.8s ease-in-out infinite;
    }
    .v-console {
      background: #050810; color: #00ff9d;
      font-family: var(--mono); font-size: 11px;
      line-height: 1.6; padding: 10px 12px;
      height: 100px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    .v-console::-webkit-scrollbar { width: 4px; }
    .v-console::-webkit-scrollbar-track { background: transparent; }
    .v-console::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 9999px; }
    .log-ok    { color: #00ff9d; }
    .log-err   { color: #ff3358; }
    .log-info  { color: #00c8ff; }
    .log-warn  { color: #ffaa00; }
    .log-muted { color: #4a6070; }

    .v-domain-badge {
      display: none; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: rgba(0,200,255,.05);
      border: 1px solid rgba(0,200,255,.15);
      border-radius: 8px;
      font-size: 11px; color: var(--accent); letter-spacing: .04em;
    }
    .v-domain-badge.show { display: flex; }
    .v-domain-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 5px var(--accent);
      flex-shrink: 0; animation: blink 2s ease-in-out infinite;
    }

    .v-divider { border: none; border-top: 1px solid var(--border); margin: 2px 0; }

    .v-items-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 160px; overflow-y: auto;
    }
    .v-items-list::-webkit-scrollbar { width: 3px; }
    .v-items-list::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 9999px; }

    .v-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; font-size: 12px; color: var(--text);
      animation: itemIn .25s var(--ease) both;
      gap: 6px;
    }
    @keyframes itemIn {
      from { opacity:0; transform: translateX(-6px); }
      to   { opacity:1; transform: translateX(0); }
    }
    .v-item-val { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .v-item-copy {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 4px; padding: 4px 8px;
      font-size: 12px; cursor: pointer; flex-shrink: 0;
      transition: color var(--speed), border-color var(--speed);
    }
    .v-item-copy:hover { color: var(--accent); border-color: var(--border-hi); }

    .v-item-edit {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 4px; padding: 2px 6px;
      font-size: 10px; cursor: pointer; flex-shrink: 0;
      transition: color var(--speed), border-color var(--speed);
    }
    .v-item-edit:hover { color: var(--warn); border-color: rgba(255,170,0,.4); }

    /* ── DELETE BUTTON ─────────────────────────────────────── */
    .v-item-delete {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 4px; padding: 2px 6px;
      font-size: 10px; cursor: pointer; flex-shrink: 0;
      transition: color var(--speed), border-color var(--speed);
    }
    .v-item-delete:hover { color: var(--danger); border-color: rgba(255,51,88,.4); }

    .v-edit-overlay {
      position: fixed; inset: 0;
      background: rgba(5,8,16,.88);
      align-items: center; justify-content: center;
      display: none;
    }
    .v-edit-overlay.show { display: flex; animation: panelIn .25s var(--ease) both; }
    .v-edit-modal {
      width: 340px; background: var(--surface2);
      border: 1px solid var(--border-hi); border-radius: 12px;
      padding: 20px; display: flex; flex-direction: column; gap: 12px;
      box-shadow: 0 0 40px rgba(0,200,255,.15);
    }
    .v-edit-modal h3 {
      font-family: var(--ui); font-size: 14px; font-weight: 700;
      color: var(--text-hi); letter-spacing: .08em; text-transform: uppercase;
    }
    .v-edit-site-label { font-size: 11px; color: var(--accent); letter-spacing: .04em; }

    .v-locked-banner {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 20px;
      color: var(--muted); font-size: 12px; text-align: center;
    }
    .v-locked-banner .icon { font-size: 28px; opacity: .4; }

    .v-step-indicator {
      display: flex; align-items: center; gap: 6px; margin-bottom: 2px;
    }
    .v-step {
      width: 22px; height: 22px; border-radius: 50%;
      display: grid; place-items: center;
      font-family: var(--ui); font-size: 11px; font-weight: 700;
      border: 1px solid var(--border); color: var(--muted);
      flex-shrink: 0; transition: all .3s var(--ease);
    }
    .v-step.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(0,200,255,.25); }
    .v-step.done   { border-color: var(--accent2); color: var(--accent2); background: rgba(0,255,157,.1); box-shadow: 0 0 8px rgba(0,255,157,.2); }
    .v-step-line { flex: 1; height: 1px; background: var(--border); transition: background .3s var(--ease); }
    .v-step-line.active { background: var(--accent2); box-shadow: 0 0 6px rgba(0,255,157,.3); }
    .v-step-label { font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; white-space: nowrap; }

    .v-site-confirm {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 12px;
      background: rgba(0,200,255,.05);
      border: 1px solid rgba(0,200,255,.15);
      border-radius: 8px;
      font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: .04em;
    }

    @keyframes stepIn {
      from { opacity:0; transform: translateX(12px); }
      to   { opacity:1; transform: translateX(0); }
    }
    #saveStep2 { animation: stepIn .28s var(--ease) both; }

    .v-item-val { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
    .v-item-site { font-size: 12px; color: var(--accent); letter-spacing: .04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .v-item-pass { font-size: 13px; color: var(--muted); letter-spacing: .1em; transition: color .2s; }
    .v-item-pass:hover { color: var(--text); }

    .v-btn-auto { flex: none; white-space: nowrap; }

    .v-breach {
      display: none; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: 6px;
      font-size: 11px; letter-spacing: .04em;
      transition: all .3s var(--ease);
    }
    .v-breach.show    { display: flex; animation: feedbackIn .25s var(--ease) both; }
    .v-breach.safe    { background: rgba(0,255,157,.07);  border: 1px solid rgba(0,255,157,.2);  color: var(--accent2); }
    .v-breach.pwned   { background: rgba(255,51,88,.1);   border: 1px solid rgba(255,51,88,.3);  color: #ff6680; }
    .v-breach.checking{ background: rgba(255,170,0,.07);  border: 1px solid rgba(255,170,0,.2);  color: var(--warn); }

    .v-edit-overlay {
      position: fixed; inset: 0;
      background: rgba(5, 8, 16, 0.95);
      backdrop-filter: blur(4px);
      z-index: 1000; display: none;
      place-items: center; padding: 20px;
    }
    .v-edit-overlay.show { display: grid; }
    .v-edit-modal {
      background: var(--surface2);
      border: 1px solid var(--border-hi);
      border-radius: 12px; padding: 24px;
      width: 100%; max-width: 320px;
      display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
    .v-edit-modal h3 { font-family: var(--ui); font-size: 16px; color: var(--accent); text-transform: uppercase; }
    #editSiteLabel {
      font-size: 12px; color: var(--accent2);
      background: rgba(0, 255, 157, 0.05);
      padding: 8px; border-radius: 4px;
      border: 1px solid rgba(0, 255, 157, 0.1);
    }

    /* ── CONFIRM GENERATED PASSWORD BUTTON ─────────────────── */
    #btnConfirmarGenerada {
      display: none;
      align-items: center; justify-content: center; gap: 8px;
      animation: feedbackIn .25s var(--ease) both;
    }
  </style>
</head>
<body>
<div class="vault-wrap">

  <!-- ── HEADER ──────────────────────────────────────────── -->
  <header class="v-header">
    <div class="v-logo">🛡️</div>
    <div class="v-header-text">
      <div class="v-title">VoidVault</div>
      <div class="v-subtitle">ZERO-KNOWLEDGE · 2026</div>
    </div>
    <div class="v-status-pill" id="statusPill">
      <span class="v-status-dot" id="statusDot"></span>
      <span id="statusText">OFFLINE</span>
    </div>
  </header>

  <!-- ── DOMAIN BADGE ─────────────────────────────────────── -->
  <div id="domainBadge" class="v-domain-badge" style="margin: 10px 16px 0;">
    <span class="v-domain-dot"></span>
    <span id="domainText">—</span>
  </div>

  <!-- ── TABS ────────────────────────────────────────────── -->
  <nav class="v-tabs" id="tabs">
    <button class="v-tab active" data-tab="auth">Acceso</button>
    <button class="v-tab" data-tab="vault" id="tabVault">Bóveda</button>
    <button class="v-tab" data-tab="register">Registro</button>
  </nav>

  <!-- ═══════════════════════════════════════════════════════
       TAB: AUTH (Login)
  ══════════════════════════════════════════════════════════ -->
  <section class="v-panel active" id="panel-auth">

    <div class="v-feedback info" id="pendingCredentialBanner" style="display:none;"></div>

    <div class="v-input-group" id="loginForm">
      <span class="v-label">Credenciales</span>

      <div class="v-field">
        <span class="v-field-icon">✉</span>
        <input class="v-input" id="email" type="email" placeholder="email@dominio.com" autocomplete="email">
      </div>

      <div class="v-field" id="masterPassField">
        <span class="v-field-icon">🔑</span>
        <input class="v-input" id="masterPass" type="password" placeholder="Contraseña maestra" autocomplete="current-password">
        <button class="v-eye" id="eyeToggle" type="button" aria-label="Ver contraseña">👁</button>
      </div>
    </div>

    <div class="v-feedback" id="loginFeedback"></div>

    <div class="v-btn-row">
      <button class="v-btn v-btn-accent" id="btnIniciar">
        <span class="spinner"></span>
        <span class="btn-text">Iniciar Sesión</span>
      </button>
    </div>

  </section>

  <!-- ═══════════════════════════════════════════════════════
       TAB: VAULT
  ══════════════════════════════════════════════════════════ -->
  <section class="v-panel" id="panel-vault">

    <!-- Locked state -->
    <div class="v-locked-banner" id="vaultLocked">
      <span class="icon">🔒</span>
      <span>Inicia sesión para acceder a la bóveda</span>
    </div>

    <!-- Unlocked state -->
    <div id="vaultUnlocked" style="display:none; flex-direction:column; gap:12px;">

      <!-- Logout / usuario -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <span id="userEmailLabel" style="font-size:10px;color:var(--accent2);letter-spacing:.06em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">—</span>
        <button class="v-btn v-btn-danger v-btn-auto" id="btnLogout" style="padding:3px 10px;font-size:11px;min-height:0;">
          <span class="btn-text">⏻ Salir</span>
        </button>
      </div>

      <!-- Bloque "Nueva credencial" -->
      <div id="saveCredentialBlock">

      <!-- ── GUARDAR CREDENCIAL ──────────────────────────────── -->
      <div id="saveStep1" style="display:flex; flex-direction:column; gap:10px;">

        <div class="v-site-confirm" id="detectedSite" style="display:none;">
          <span class="v-domain-dot"></span>
          <span id="detectedSiteLabel">Detectando sitio...</span>
        </div>
        <input type="hidden" id="siteUrl">

        <div class="v-field">
          <span class="v-field-icon">🔑</span>
          <input class="v-input" id="sitePass" type="password" placeholder="Contraseña del sitio">
          <button class="v-eye" id="eyeSitePass" type="button">👁</button>
        </div>

        <!-- Generate button -->
        <button class="v-btn v-btn-ghost v-btn-full" id="btnGenerar" type="button">
          <span class="spinner"></span>
          <span class="btn-text">⚡ Generar contraseña</span>
        </button>

        <!-- Confirm generated password button (shown only after generating) -->
        <button class="v-btn v-btn-success v-btn-full" id="btnConfirmarGenerada" type="button">
          <span class="btn-text">✅ Usar esta contraseña</span>
        </button>

        <div class="v-breach" id="breachBadge"></div>

        <div class="v-feedback" id="step1Feedback"></div>

        <button class="v-btn v-btn-warn v-btn-full" id="btnSiguiente">
          <span class="spinner"></span>
          <span class="btn-text">🔒 Cifrar y guardar</span>
        </button>
      </div>

      </div>
      <!-- /saveCredentialBlock -->

      <hr class="v-divider">

      <div style="display:flex; align-items:center; justify-content:space-between;">
        <span class="v-label">Secretos almacenados</span>
        <button class="v-btn v-btn-success v-btn-auto" id="btnDescargar" style="padding:4px 10px;font-size:11px;">
          <span class="spinner"></span>
          <span class="btn-text">↓ Cargar</span>
        </button>
      </div>

      <div class="v-field" style="margin-bottom:-4px;">
        <span class="v-field-icon">🔍</span>
        <input class="v-input" id="searchInput" type="text" placeholder="Buscar por sitio...">
      </div>

      <div class="v-items-list" id="itemsList">
        <!-- items injected by JS -->
      </div>
      <div class="v-feedback" id="listFeedback"></div>

      <button class="v-btn v-btn-ghost v-btn-full" id="btnCambiarPass" type="button" style="margin-top:4px;font-size:11px;opacity:.6;">
        <span class="btn-text">🔑 Cambiar contraseña maestra</span>
      </button>

    </div>

  </section>

  <!-- ═══════════════════════════════════════════════════════
       TAB: REGISTER
  ══════════════════════════════════════════════════════════ -->
  <section class="v-panel" id="panel-register">

    <div class="v-input-group">
      <span class="v-label">Nuevo usuario</span>

      <div class="v-field">
        <span class="v-field-icon">✉</span>
        <input class="v-input" id="regEmail" type="email" placeholder="email@dominio.com">
      </div>

      <div class="v-field">
        <span class="v-field-icon">🔑</span>
        <input class="v-input" id="regPass" type="password" placeholder="Contraseña maestra">
        <button class="v-eye" id="eyeToggleReg" type="button">👁</button>
      </div>

      <div class="v-strength">
        <div class="v-strength-track">
          <div class="v-strength-fill" id="strengthFill"></div>
        </div>
        <span class="v-strength-label" id="strengthLabel">— sin evaluar</span>
      </div>

      <div class="v-field">
        <span class="v-field-icon">✔</span>
        <input class="v-input" id="regPassConfirm" type="password" placeholder="Confirmar contraseña">
      </div>
    </div>

    <div class="v-feedback" id="regFeedback"></div>

    <button class="v-btn v-btn-ghost v-btn-full" id="btnRegistrar">
      <span class="spinner"></span>
      <span class="btn-text">Crear cuenta</span>
    </button>

  </section>

  <!-- ── MODAL EDITAR CONTRASEÑA ──────────────────────────── -->
  <div class="v-edit-overlay" id="editOverlay">
    <div class="v-edit-modal">
      <h3>✏️ Editar contraseña</h3>
      <span class="v-edit-site-label" id="editSiteLabel"></span>
      <input type="hidden" id="editItemId">
      <div class="v-field">
        <span class="v-field-icon">🔑</span>
        <input class="v-input" id="editNewPass" type="password" placeholder="Nueva contraseña">
        <button class="v-eye" id="eyeEditNew" type="button">👁</button>
      </div>
      <div class="v-breach" id="editBreachBadge"></div>
      <div class="v-field">
        <span class="v-field-icon">✔</span>
        <input class="v-input" id="editNewPassConfirm" type="password" placeholder="Confirmar nueva contraseña">
        <button class="v-eye" id="eyeEditConfirm" type="button">👁</button>
      </div>
      <div class="v-feedback" id="editFeedback"></div>
      <div class="v-btn-row">
        <button class="v-btn v-btn-ghost v-btn-auto" id="btnEditCancelar">Cancelar</button>
        <button class="v-btn v-btn-warn" id="btnEditGuardar">
          <span class="spinner"></span>
          <span class="btn-text">🔒 Guardar cambio</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── MODAL CAMBIAR CONTRASEÑA MAESTRA ────────────────── -->
  <div class="v-edit-overlay" id="cambiarPassOverlay">
    <div class="v-edit-modal">
      <h3>🔑 Cambiar contraseña maestra</h3>
      <div class="v-field">
        <span class="v-field-icon">🔓</span>
        <input class="v-input" id="oldMasterPass" type="password" placeholder="Contraseña actual">
        <button class="v-eye" id="eyeOldMaster" type="button">👁</button>
      </div>
      <div class="v-field">
        <span class="v-field-icon">🔑</span>
        <input class="v-input" id="newMasterPass" type="password" placeholder="Nueva contraseña maestra">
        <button class="v-eye" id="eyeNewMaster" type="button">👁</button>
      </div>
      <div class="v-field">
        <span class="v-field-icon">✔</span>
        <input class="v-input" id="newMasterPassConfirm" type="password" placeholder="Confirmar nueva contraseña">
      </div>
      <div class="v-feedback" id="cambiarPassFeedback"></div>
      <div class="v-btn-row">
        <button class="v-btn v-btn-ghost v-btn-auto" id="btnCambiarPassCancelar">Cancelar</button>
        <button class="v-btn v-btn-warn" id="btnCambiarPassGuardar">
          <span class="spinner"></span>
          <span class="btn-text">🔒 Cambiar</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── LOG CONSOLE ──────────────────────────────────────── -->
  <div class="v-console-wrap">
    <div class="v-console-bar">
      <span class="v-console-dot"></span>
      TERMINAL · VOIDVAULT
    </div>
    <div class="v-console" id="log">Sistema iniciado...</div>
  </div>

</div>
<script src="config.js"></script>
<script src="popup.js"></script>
</body>
</html>
