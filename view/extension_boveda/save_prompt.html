<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VoidVault — Guardar contraseña</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #080c10;
      --accent:  #00c8ff;
      --accent2: #00ff9d;
      --danger:  #ff3358;
      --text:    #c8d8e8;
      --text-hi: #eaf4ff;
      --muted:   #4a6070;
      --ui:      'Rajdhani', sans-serif;
      --mono:    'Share Tech Mono', monospace;
      --ease:    cubic-bezier(.16,1,.3,1);
    }
    html, body {
      width: 380px; height: 210px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,200,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
      background-size: 200% 100%;
      animation: sweep 3s linear infinite;
    }
    @keyframes sweep { 0%{background-position:0%} 100%{background-position:200%} }

    .wrap {
      position: relative; z-index: 1;
      height: 100%;
      display: flex; flex-direction: column;
      justify-content: center;
      gap: 16px;
      padding: 20px 20px 18px;
    }
    .top-row { display: flex; align-items: center; gap: 13px; }
    .icon-box {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 10px;
      border: 1px solid rgba(0,200,255,.4);
      background: radial-gradient(circle at 30% 30%, rgba(0,200,255,.18), transparent 70%);
      display: grid; place-items: center; font-size: 22px;
      box-shadow: 0 0 20px rgba(0,200,255,.2);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{box-shadow:0 0 16px rgba(0,200,255,.2)}
      50%{box-shadow:0 0 30px rgba(0,200,255,.45)}
    }
    .text-block { flex: 1; min-width: 0; }
    .title {
      font-family: var(--ui);
      font-size: 15px; font-weight: 700;
      color: var(--text-hi);
      letter-spacing: .06em; text-transform: uppercase;
    }
    .domain {
      font-size: 12px; color: var(--accent);
      margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: .04em;
    }
    .status {
      font-size: 10px; margin-top: 4px;
      letter-spacing: .06em; font-family: var(--ui);
    }
    .status.online  { color: var(--accent2); }
    .status.offline { color: var(--muted); }

    .btn-row { display: flex; gap: 8px; }
    .btn {
      flex: 1; min-height: 40px; padding: 9px 14px;
      border-radius: 8px; border: 1px solid transparent;
      font-family: var(--ui); font-size: 13px; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
      cursor: pointer;
      transition: transform .18s var(--ease), box-shadow .18s var(--ease);
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(.97); }
    .btn-save {
      background: linear-gradient(135deg, rgba(0,200,255,.22), rgba(0,200,255,.08));
      border-color: rgba(0,200,255,.5); color: var(--accent);
      box-shadow: 0 0 16px rgba(0,200,255,.12);
    }
    .btn-save:hover:not(:disabled) {
      border-color: var(--accent);
      box-shadow: 0 0 24px rgba(0,200,255,.3);
      transform: translateY(-1px);
    }
    .btn-dismiss {
      flex: 0 0 auto;
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.08);
      color: var(--muted);
    }
    .btn-dismiss:hover { color: var(--danger); border-color: rgba(255,51,88,.35); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <div class="icon-box">🛡️</div>
    <div class="text-block">
      <div class="title">¿Guardar contraseña?</div>
      <div class="domain" id="domainLabel">cargando...</div>
      <div class="status" id="statusLabel">comprobando sesión...</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-save" id="btnSave" disabled>⚡ Guardar en Vault</button>
    <button class="btn btn-dismiss" id="btnDismiss">Ignorar</button>
  </div>
</div>
<script src="save_prompt.js"></script>
</body>
</html>
